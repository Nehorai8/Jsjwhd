<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מלווה אישי AI</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app-container { width: 100%; max-width: 500px; height: 90vh; background: white; box-shadow: 0 8px 24px rgba(0,0,0,0.15); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #28a745; color: white; padding: 20px; text-align: center; font-size: 1.3rem; font-weight: bold; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; }
        .user { background: #28a745; color: white; align-self: flex-start; }
        .bot { background: #f1f3f4; color: #202124; align-self: flex-end; border: 1px solid #e0e0e0; }
        .warning { background: #fff3cd; color: #856404; font-size: 0.8rem; padding: 8px; text-align: center; border-bottom: 1px solid #ffeeba; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #ededed; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #chchch; border-radius: 24px; outline: none; padding-right: 15px; }
        button { background: #28a745; color: white; border: none; padding: 0 20px; border-radius: 24px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">📋 המלווה האישי שלך</div>
    <div class="warning">⚠️ שים לב: אפליקציה זו מספקת מידע ותמיכה בלבד ואינה מחליפה ייעוץ רפואי או פסיכולוגי מקצועי.</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="איך אוכל לעזור לך עכשיו?" onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">שילוח</button>
    </div>
</div>

<script>
    const API_KEY = "הכנס_את_מפתח_ה_API_שלך_כאן"; 
    const API_URL = `https://googleapis.com{API_KEY}`;
    const chatBox = document.getElementById('chatBox');

    // פנייה אקטיבית של ה-AI מיד כשהאתר נפתח
    window.onload = function() {
        setTimeout(() => {
            appendMessage("היי! אני כאן איתך. במה נרצה להתמקד עכשיו? \n1. עזרה בלימודים ותכנות 📚\n2. כלים להתמודדות עם קשב וריכוז 🎯\n3. שיתוף וליווי רגשי 🧠", 'bot');
        }, 500);
    };

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot';
        loadingDiv.innerText = 'בודק ומחשב תשובה מדויקת...';
        chatBox.appendChild(loadingDiv);

        // הנחיית מערכת סמויה שנשלחת לגוגל כדי להבטיח תשובה בטוחה ומקצועית
        const systemPrompt = "אתה עוזר אישי, מומחה ללימודים, אסטרטגיות קשב וריכוז ותמיכה רגשית. תן תשובות מבוססות מדעית, קצרות, מעשיות ומעודדות. אל תמציא עובדות. אם המשתמש מראה סימני דיכאון קשים או סכנה, תפנה אותו לגורם מקצועי באופן רגיש. תענה בעברית רהוטה וברורה.";

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemPrompt + "\n\nהודעת המשתמש: " + text }] }]
                })
            });

            const data = await response.json();
            loadingDiv.remove();

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                appendMessage(data.candidates[0].content.parts[0].text, 'bot');
            } else {
                appendMessage('סליחה, חלה שגיאה בעיבוד הנתונים. נסה שוב.', 'bot');
            }
        } catch (error) {
            loadingDiv.remove();
            appendMessage('שגיאת תקשורת. אנא ודא שמפתח ה-API הוכנס כראוי.', 'bot');
        }
    }
</script>

</body>
</html>
